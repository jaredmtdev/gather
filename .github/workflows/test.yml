name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6.4.0
        with:
          go-version-file: go.mod
      - name: go env
        run: go env
      - name: Run Go tests
        if: ${{ matrix.os != 'windows-latest' }}
        run: go test -race -v -p 1 -parallel 2 `go list ./... | grep -v 'examples'` -coverprofile=coverage.out
      - name: Run Go tests for windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          go test -race -v -p 1 -parallel 2 @(
            go list ./... | Where-Object { $_ -notmatch 'examples' }
          )
      - name: Check Coverage
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          go tool cover -func coverage.out
          coverage=$(go tool cover -func coverage.out | tail -1 | awk '{ print $3; }')
          echo "total coverage: $coverage"
          [[ $coverage == "100.0%" ]] || exit 1
      - name: Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad #v5.5.3
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          files: coverage.out
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
